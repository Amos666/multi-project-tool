name: Build & Package

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write   # release job 需要 upload asset 权限

jobs:
  build:
    name: Compile & Package VSIX
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Package VSIX
        run: |
          npx @vscode/vsce --version
          npx @vscode/vsce package --no-git-tag-version --no-update-package-json --allow-star-activation -o multi-project-tool-${{ github.ref_name }}.vsix
        # 在 push 到分支时 ref_name 是分支名，可能含 '/'；用 SHA 兜底命名
        id: pkg
        continue-on-error: true

      - name: Fallback package name (branch with slash)
        if: steps.pkg.outcome != 'success'
        run: |
          npx @vscode/vsce package --no-git-tag-version --no-update-package-json --allow-star-activation -o multi-project-tool-${{ github.sha }}.vsix

      - name: Verify VSIX contents
        run: |
          unzip -l multi-project-tool-*.vsix | head -50
          echo "---"
          unzip -l multi-project-tool-*.vsix | grep -E "resources/icon|package.json|extension.js" || true

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: multi-project-tool-vsix
          path: multi-project-tool-*.vsix
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # 仅在推送 v* tag 时执行
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: multi-project-tool-vsix
          path: ./assets

      - name: List downloaded assets
        run: ls -la ./assets

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./assets/*.vsix
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
